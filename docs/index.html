<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=0.1, maximum-scale=10.0, user-scalable=yes">
<title>14M Calendar</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #1a1a1a;
    touch-action: none;
  }
  #container {
    width: 100%;
    height: 100%;
    overflow: hidden;
    position: relative;
    cursor: grab;
  }
  #container.grabbing { cursor: grabbing; }
  #calendar {
    position: absolute;
    top: 0;
    left: 0;
    transform-origin: 0 0;
    will-change: transform;
    pointer-events: none;
  }
  #calendar img {
    display: block;
    max-width: none;
    pointer-events: none;
    user-select: none;
    -webkit-user-drag: none;
  }
  #controls {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 100;
    display: flex;
    gap: 8px;
    flex-direction: column;
  }
  #controls button {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: none;
    background: rgba(255,255,255,0.85);
    color: #333;
    font-size: 22px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #controls button:active {
    background: rgba(200,200,200,0.9);
  }
  #info {
    position: fixed;
    bottom: 8px;
    left: 8px;
    color: rgba(255,255,255,0.5);
    font-size: 11px;
    font-family: monospace;
    z-index: 100;
  }
</style>
</head>
<body>
<div id="container">
  <div id="calendar">
    <img src="calendar.svg" alt="14M Calendar" id="svgImg" draggable="false">
  </div>
</div>

<div id="controls">
  <button id="zoomIn">+</button>
  <button id="zoomOut">&minus;</button>
  <button id="zoomFit">&#8689;</button>
</div>

<div id="info"></div>

<script>
(function() {
  var container = document.getElementById('container');
  var cal = document.getElementById('calendar');
  var info = document.getElementById('info');
  var svgImg = document.getElementById('svgImg');

  var scale = 1;
  var panX = 0, panY = 0;
  var isDragging = false;
  var startX, startY, startPanX, startPanY;
  var lastPinchDist = 0;

  var MIN_SCALE = 0.02;
  var MAX_SCALE = 8;

  function applyTransform() {
    cal.style.transform = 'translate(' + panX + 'px,' + panY + 'px) scale(' + scale + ')';
    info.textContent = Math.round(scale * 100) + '%';
  }

  function zoomAt(cx, cy, factor) {
    var newScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, scale * factor));
    var ratio = newScale / scale;
    panX = cx - (cx - panX) * ratio;
    panY = cy - (cy - panY) * ratio;
    scale = newScale;
    applyTransform();
  }

  function fitToScreen() {
    var cw = container.clientWidth;
    var ch = container.clientHeight;
    var sw = svgImg.naturalWidth || 4000;
    var sh = svgImg.naturalHeight || 3000;
    scale = Math.min(cw / sw, ch / sh);
    panX = (cw - sw * scale) / 2;
    panY = 0;
    applyTransform();
  }

  // Mouse wheel zoom (PC)
  container.addEventListener('wheel', function(e) {
    e.preventDefault();
    var rect = container.getBoundingClientRect();
    var cx = e.clientX - rect.left;
    var cy = e.clientY - rect.top;
    var factor = e.deltaY < 0 ? 1.15 : 1 / 1.15;
    zoomAt(cx, cy, factor);
  }, { passive: false });

  // Mouse drag (PC)
  container.addEventListener('mousedown', function(e) {
    isDragging = true;
    startX = e.clientX;
    startY = e.clientY;
    startPanX = panX;
    startPanY = panY;
    container.classList.add('grabbing');
    e.preventDefault();
  });
  window.addEventListener('mousemove', function(e) {
    if (!isDragging) return;
    panX = startPanX + (e.clientX - startX);
    panY = startPanY + (e.clientY - startY);
    applyTransform();
  });
  window.addEventListener('mouseup', function() {
    isDragging = false;
    container.classList.remove('grabbing');
  });

  // Touch: drag + pinch zoom (iPhone/mobile)
  container.addEventListener('touchstart', function(e) {
    if (e.touches.length === 1) {
      isDragging = true;
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
      startPanX = panX;
      startPanY = panY;
    } else if (e.touches.length === 2) {
      isDragging = false;
      var dx = e.touches[0].clientX - e.touches[1].clientX;
      var dy = e.touches[0].clientY - e.touches[1].clientY;
      lastPinchDist = Math.sqrt(dx * dx + dy * dy);
    }
    e.preventDefault();
  }, { passive: false });

  container.addEventListener('touchmove', function(e) {
    if (e.touches.length === 1 && isDragging) {
      panX = startPanX + (e.touches[0].clientX - startX);
      panY = startPanY + (e.touches[0].clientY - startY);
      applyTransform();
    } else if (e.touches.length === 2) {
      var dx = e.touches[0].clientX - e.touches[1].clientX;
      var dy = e.touches[0].clientY - e.touches[1].clientY;
      var dist = Math.sqrt(dx * dx + dy * dy);
      if (lastPinchDist > 0) {
        var factor = dist / lastPinchDist;
        var rect = container.getBoundingClientRect();
        var cx = (e.touches[0].clientX + e.touches[1].clientX) / 2 - rect.left;
        var cy = (e.touches[0].clientY + e.touches[1].clientY) / 2 - rect.top;
        zoomAt(cx, cy, factor);
      }
      lastPinchDist = dist;
    }
    e.preventDefault();
  }, { passive: false });

  container.addEventListener('touchend', function(e) {
    if (e.touches.length < 2) lastPinchDist = 0;
    if (e.touches.length === 0) isDragging = false;
  });

  // Double-click/tap to zoom in
  container.addEventListener('dblclick', function(e) {
    var rect = container.getBoundingClientRect();
    zoomAt(e.clientX - rect.left, e.clientY - rect.top, 2);
  });

  // Buttons
  document.getElementById('zoomIn').addEventListener('click', function(e) {
    e.stopPropagation();
    var rect = container.getBoundingClientRect();
    zoomAt(rect.width / 2, rect.height / 2, 1.5);
  });
  document.getElementById('zoomOut').addEventListener('click', function(e) {
    e.stopPropagation();
    var rect = container.getBoundingClientRect();
    zoomAt(rect.width / 2, rect.height / 2, 1 / 1.5);
  });
  document.getElementById('zoomFit').addEventListener('click', function(e) {
    e.stopPropagation();
    fitToScreen();
  });

  // Initial fit after SVG image loads
  svgImg.addEventListener('load', function() {
    fitToScreen();
  });
  if (svgImg.complete) {
    fitToScreen();
  }
})();
</script>
</body>
</html>
