<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>14M Calendar</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #1a1a1a;
    touch-action: none;
  }
  #svgContainer {
    width: 100%;
    height: 100%;
    cursor: grab;
  }
  #svgContainer.grabbing { cursor: grabbing; }
  #svgContainer svg {
    width: 100%;
    height: 100%;
    display: block;
  }
  #controls {
    position: fixed;
    bottom: 20px;
    right: 8px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    z-index: 100;
  }
  #controls button {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: none;
    background: rgba(255,255,255,0.85);
    color: #333;
    font-size: 22px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #controls button:active {
    background: rgba(200,200,200,0.9);
  }
  #info {
    position: fixed;
    bottom: 8px;
    left: 8px;
    color: rgba(255,255,255,0.5);
    font-size: 11px;
    font-family: monospace;
    z-index: 100;
  }
  #loading {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #fff;
    font-size: 18px;
    font-family: sans-serif;
  }
</style>
</head>
<body>

<div id="svgContainer"></div>

<div id="controls">
  <button id="zoomIn">+</button>
  <button id="zoomOut">&minus;</button>
  <button id="zoomFit">&#8689;</button>
</div>

<div id="info"></div>
<div id="loading">読み込み中...</div>

<script>
(function() {
  var container = document.getElementById('svgContainer');
  var info = document.getElementById('info');
  var loading = document.getElementById('loading');

  var vbX, vbY, vbW, vbH;
  var origW, origH;
  var svgEl = null;

  var isDragging = false;
  var startX, startY, startVbX, startVbY;
  var lastPinchDist = 0;

  var MIN_ZOOM = 0.1;
  var MAX_ZOOM = 20;

  function updateInfo() {
    var zoom = Math.round(origW / vbW * 100);
    info.textContent = zoom + '%';
  }

  function applyViewBox() {
    if (svgEl) {
      svgEl.setAttribute('viewBox', vbX + ' ' + vbY + ' ' + vbW + ' ' + vbH);
      updateInfo();
    }
  }

  function screenToSvg(sx, sy) {
    var rect = container.getBoundingClientRect();
    return {
      x: vbX + (sx / rect.width) * vbW,
      y: vbY + (sy / rect.height) * vbH
    };
  }

  function zoomAt(screenX, screenY, factor) {
    var pt = screenToSvg(screenX, screenY);
    var newW = vbW / factor;
    var newH = vbH / factor;

    var minW = origW / MAX_ZOOM;
    var maxW = origW / MIN_ZOOM;
    if (newW < minW) { newW = minW; newH = origH / MAX_ZOOM; }
    if (newW > maxW) { newW = maxW; newH = origH / MIN_ZOOM; }

    vbX = pt.x - (pt.x - vbX) * (newW / vbW);
    vbY = pt.y - (pt.y - vbY) * (newH / vbH);
    vbW = newW;
    vbH = newH;

    applyViewBox();
  }

  function fitToScreen() {
    vbX = 0;
    vbY = 0;
    vbW = origW;
    vbH = origH;
    applyViewBox();
  }

  // Fetch SVG and inline it
  fetch('calendar.svg?t=' + Date.now())
    .then(function(r) { return r.text(); })
    .then(function(svgText) {
      container.innerHTML = svgText;
      svgEl = container.querySelector('svg');
      loading.style.display = 'none';

      if (svgEl) {
        var vb = svgEl.getAttribute('viewBox');
        if (vb) {
          var parts = vb.split(/[\s,]+/);
          origW = parseFloat(parts[2]);
          origH = parseFloat(parts[3]);
        } else {
          origW = parseFloat(svgEl.getAttribute('width')) || 4000;
          origH = parseFloat(svgEl.getAttribute('height')) || 3000;
          svgEl.setAttribute('viewBox', '0 0 ' + origW + ' ' + origH);
        }

        svgEl.removeAttribute('width');
        svgEl.removeAttribute('height');
        svgEl.style.width = '100%';
        svgEl.style.height = '100%';

        vbX = 0;
        vbY = 0;
        vbW = origW;
        vbH = origH;
        applyViewBox();
      }
    })
    .catch(function(err) {
      loading.textContent = 'SVG読み込みエラー: ' + err.message;
    });

  // Mouse wheel zoom
  container.addEventListener('wheel', function(e) {
    e.preventDefault();
    var factor = e.deltaY < 0 ? 1.15 : 1 / 1.15;
    var rect = container.getBoundingClientRect();
    zoomAt(e.clientX - rect.left, e.clientY - rect.top, factor);
  }, { passive: false });

  // Mouse drag
  container.addEventListener('mousedown', function(e) {
    e.preventDefault();
    isDragging = true;
    startX = e.clientX;
    startY = e.clientY;
    startVbX = vbX;
    startVbY = vbY;
    container.classList.add('grabbing');
  });

  window.addEventListener('mousemove', function(e) {
    if (!isDragging) return;
    var rect = container.getBoundingClientRect();
    var dx = (e.clientX - startX) * (vbW / rect.width);
    var dy = (e.clientY - startY) * (vbH / rect.height);
    vbX = startVbX - dx;
    vbY = startVbY - dy;
    applyViewBox();
  });

  window.addEventListener('mouseup', function() {
    isDragging = false;
    container.classList.remove('grabbing');
  });

  // Double click to zoom in
  container.addEventListener('dblclick', function(e) {
    var rect = container.getBoundingClientRect();
    zoomAt(e.clientX - rect.left, e.clientY - rect.top, 2);
  });

  // Touch events for mobile
  container.addEventListener('touchstart', function(e) {
    e.preventDefault();
    if (e.touches.length === 1) {
      isDragging = true;
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
      startVbX = vbX;
      startVbY = vbY;
    } else if (e.touches.length === 2) {
      isDragging = false;
      var dx = e.touches[0].clientX - e.touches[1].clientX;
      var dy = e.touches[0].clientY - e.touches[1].clientY;
      lastPinchDist = Math.sqrt(dx * dx + dy * dy);
    }
  }, { passive: false });

  container.addEventListener('touchmove', function(e) {
    e.preventDefault();
    if (e.touches.length === 1 && isDragging) {
      var rect = container.getBoundingClientRect();
      var dx = (e.touches[0].clientX - startX) * (vbW / rect.width);
      var dy = (e.touches[0].clientY - startY) * (vbH / rect.height);
      vbX = startVbX - dx;
      vbY = startVbY - dy;
      applyViewBox();
    } else if (e.touches.length === 2) {
      var tdx = e.touches[0].clientX - e.touches[1].clientX;
      var tdy = e.touches[0].clientY - e.touches[1].clientY;
      var dist = Math.sqrt(tdx * tdx + tdy * tdy);
      if (lastPinchDist > 0) {
        var factor = dist / lastPinchDist;
        var rect = container.getBoundingClientRect();
        var cx = (e.touches[0].clientX + e.touches[1].clientX) / 2 - rect.left;
        var cy = (e.touches[0].clientY + e.touches[1].clientY) / 2 - rect.top;
        zoomAt(cx, cy, factor);
      }
      lastPinchDist = dist;
    }
  }, { passive: false });

  container.addEventListener('touchend', function(e) {
    if (e.touches.length < 2) lastPinchDist = 0;
    if (e.touches.length === 0) isDragging = false;
  });

  // Button controls
  document.getElementById('zoomIn').addEventListener('click', function(e) {
    e.stopPropagation();
    var rect = container.getBoundingClientRect();
    zoomAt(rect.width / 2, rect.height / 2, 1.3);
  });
  document.getElementById('zoomOut').addEventListener('click', function(e) {
    e.stopPropagation();
    var rect = container.getBoundingClientRect();
    zoomAt(rect.width / 2, rect.height / 2, 1 / 1.3);
  });
  document.getElementById('zoomFit').addEventListener('click', function(e) {
    e.stopPropagation();
    fitToScreen();
  });
})();
</script>
</body>
</html>
