<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=0.1, maximum-scale=10.0, user-scalable=yes">
<title>14M Calendar</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #1a1a1a;
    touch-action: none;
  }
  #overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    z-index: 10;
    cursor: grab;
    background: transparent;
  }
  #overlay.grabbing { cursor: grabbing; }
  #calendar {
    position: absolute;
    top: 0;
    left: 0;
    transform-origin: 0 0;
    will-change: transform;
    z-index: 1;
  }
  #calendar object {
    display: block;
    max-width: none;
  }
  #controls {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 100;
    display: flex;
    gap: 8px;
    flex-direction: column;
  }
  #controls button {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: none;
    background: rgba(255,255,255,0.85);
    color: #333;
    font-size: 22px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #controls button:active {
    background: rgba(200,200,200,0.9);
  }
  #info {
    position: fixed;
    bottom: 8px;
    left: 8px;
    color: rgba(255,255,255,0.5);
    font-size: 11px;
    font-family: monospace;
    z-index: 100;
  }
</style>
</head>
<body>

<div id="calendar">
  <object data="calendar.svg" type="image/svg+xml" id="svgObj">SVG not supported</object>
</div>

<!-- Transparent overlay captures all mouse/touch events for drag & zoom -->
<div id="overlay"></div>

<div id="controls">
  <button id="zoomIn">+</button>
  <button id="zoomOut">&minus;</button>
  <button id="zoomFit">&#8689;</button>
</div>

<div id="info"></div>

<script>
(function() {
  var overlay = document.getElementById('overlay');
  var cal = document.getElementById('calendar');
  var info = document.getElementById('info');
  var svgObj = document.getElementById('svgObj');

  var scale = 1;
  var panX = 0, panY = 0;
  var isDragging = false;
  var startX, startY, startPanX, startPanY;
  var lastPinchDist = 0;

  var MIN_SCALE = 0.02;
  var MAX_SCALE = 20;

  function applyTransform() {
    cal.style.transform = 'translate(' + panX + 'px,' + panY + 'px) scale(' + scale + ')';
    info.textContent = Math.round(scale * 100) + '%';
  }

  function zoomAt(cx, cy, factor) {
    var newScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, scale * factor));
    var ratio = newScale / scale;
    panX = cx - (cx - panX) * ratio;
    panY = cy - (cy - panY) * ratio;
    scale = newScale;
    applyTransform();
  }

  function getSvgSize() {
    var sw = 4000, sh = 3000;
    try {
      var doc = svgObj.contentDocument;
      if (doc) {
        var svg = doc.querySelector('svg');
        if (svg) {
          var vb = svg.getAttribute('viewBox');
          if (vb) {
            var parts = vb.split(/[\s,]+/);
            sw = parseFloat(parts[2]) || sw;
            sh = parseFloat(parts[3]) || sh;
          }
          if (svg.getAttribute('width')) sw = parseFloat(svg.getAttribute('width')) || sw;
          if (svg.getAttribute('height')) sh = parseFloat(svg.getAttribute('height')) || sh;
        }
      }
    } catch(e) {}
    return { w: sw, h: sh };
  }

  function fitToScreen() {
    var cw = window.innerWidth;
    var ch = window.innerHeight;
    var size = getSvgSize();
    scale = Math.min(cw / size.w, ch / size.h);
    panX = (cw - size.w * scale) / 2;
    panY = 0;
    applyTransform();
  }

  // Mouse wheel zoom (PC)
  overlay.addEventListener('wheel', function(e) {
    e.preventDefault();
    var cx = e.clientX;
    var cy = e.clientY;
    var factor = e.deltaY < 0 ? 1.15 : 1 / 1.15;
    zoomAt(cx, cy, factor);
  }, { passive: false });

  // Mouse drag (PC)
  overlay.addEventListener('mousedown', function(e) {
    isDragging = true;
    startX = e.clientX;
    startY = e.clientY;
    startPanX = panX;
    startPanY = panY;
    overlay.classList.add('grabbing');
    e.preventDefault();
  });
  window.addEventListener('mousemove', function(e) {
    if (!isDragging) return;
    panX = startPanX + (e.clientX - startX);
    panY = startPanY + (e.clientY - startY);
    applyTransform();
  });
  window.addEventListener('mouseup', function() {
    isDragging = false;
    overlay.classList.remove('grabbing');
  });

  // Touch: drag + pinch zoom (iPhone/mobile)
  overlay.addEventListener('touchstart', function(e) {
    if (e.touches.length === 1) {
      isDragging = true;
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
      startPanX = panX;
      startPanY = panY;
    } else if (e.touches.length === 2) {
      isDragging = false;
      var dx = e.touches[0].clientX - e.touches[1].clientX;
      var dy = e.touches[0].clientY - e.touches[1].clientY;
      lastPinchDist = Math.sqrt(dx * dx + dy * dy);
    }
    e.preventDefault();
  }, { passive: false });

  overlay.addEventListener('touchmove', function(e) {
    if (e.touches.length === 1 && isDragging) {
      panX = startPanX + (e.touches[0].clientX - startX);
      panY = startPanY + (e.touches[0].clientY - startY);
      applyTransform();
    } else if (e.touches.length === 2) {
      var dx = e.touches[0].clientX - e.touches[1].clientX;
      var dy = e.touches[0].clientY - e.touches[1].clientY;
      var dist = Math.sqrt(dx * dx + dy * dy);
      if (lastPinchDist > 0) {
        var factor = dist / lastPinchDist;
        var cx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
        var cy = (e.touches[0].clientY + e.touches[1].clientY) / 2;
        zoomAt(cx, cy, factor);
      }
      lastPinchDist = dist;
    }
    e.preventDefault();
  }, { passive: false });

  overlay.addEventListener('touchend', function(e) {
    if (e.touches.length < 2) lastPinchDist = 0;
    if (e.touches.length === 0) isDragging = false;
  });

  // Double-click/tap to zoom in
  overlay.addEventListener('dblclick', function(e) {
    zoomAt(e.clientX, e.clientY, 2);
  });

  // Buttons (z-index above overlay)
  document.getElementById('zoomIn').addEventListener('click', function(e) {
    e.stopPropagation();
    zoomAt(window.innerWidth / 2, window.innerHeight / 2, 1.5);
  });
  document.getElementById('zoomOut').addEventListener('click', function(e) {
    e.stopPropagation();
    zoomAt(window.innerWidth / 2, window.innerHeight / 2, 1 / 1.5);
  });
  document.getElementById('zoomFit').addEventListener('click', function(e) {
    e.stopPropagation();
    fitToScreen();
  });

  // Initial fit after SVG loads
  svgObj.addEventListener('load', function() {
    fitToScreen();
  });
  setTimeout(fitToScreen, 2000);
})();
</script>
</body>
</html>
